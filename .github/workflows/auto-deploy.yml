name: Deploy Next.js app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.DEPLOY_SERVER_HOST }}
          username: ${{ secrets.DEPLOY_SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SERVER_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            set -x
            cd /var/www/Timesheet-app
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            echo "Deploy user: $(whoami) (uid=$(id -u))"
            if [ "$(id -u)" -ne 0 ]; then
              if ! sudo -n true 2>/dev/null; then
                echo "ERROR: sudo requires password for this user. Configure passwordless sudo for systemctl."
                exit 1
              fi
              if ! sudo -n systemctl cat timesheet-app.service >/dev/null 2>&1; then
                echo "ERROR: timesheet-app.service not found on server"
                sudo -n systemctl list-unit-files | grep timesheet || true
                exit 1
              fi
              if ! sudo -n systemctl restart timesheet-app.service; then
                echo "ERROR: restart failed for timesheet-app.service"
                sudo -n systemctl --no-pager --full status timesheet-app.service || true
                sudo -n journalctl -u timesheet-app.service -n 120 --no-pager || true
                exit 1
              fi
              sudo -n systemctl --no-pager --full status timesheet-app.service
            else
              if ! systemctl cat timesheet-app.service >/dev/null 2>&1; then
                echo "ERROR: timesheet-app.service not found on server"
                systemctl list-unit-files | grep timesheet || true
                exit 1
              fi
              if ! systemctl restart timesheet-app.service; then
                echo "ERROR: restart failed for timesheet-app.service"
                systemctl --no-pager --full status timesheet-app.service || true
                journalctl -u timesheet-app.service -n 120 --no-pager || true
                exit 1
              fi
              systemctl --no-pager --full status timesheet-app.service
            fi
