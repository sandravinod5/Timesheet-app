<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Three stacked S strokes, offset to create a multi-line "S" like the reference.
       Each traces itself, then fades, in a continuous loop. -->
  <g fill="none" stroke-linecap="round" stroke-width="6">
    <!-- Outer S (blue) -->
    <path d="M140 70
             C140 52, 120 46, 100 46
             C76 46, 60 58, 60 74
             C60 90, 80 96, 100 100
             C120 104, 140 110, 140 126
             C140 142, 124 154, 100 154
             C80 154, 60 148, 60 130"
          stroke="#1473e0"
          stroke-dasharray="260"
          stroke-dashoffset="260">
      <animate attributeName="stroke-dashoffset"
               values="260;0;-260"
               dur="2.4s"
               repeatCount="indefinite"/>
      <animate attributeName="opacity"
               values="1;1;0;1"
               keyTimes="0;0.5;0.75;1"
               dur="2.4s"
               repeatCount="indefinite"/>
    </path>

    <!-- Middle S (white) -->
    <path d="M132 74
             C132 58, 116 54, 100 54
             C80 54, 68 64, 68 76
             C68 90, 84 96, 100 100
             C116 104, 132 110, 132 124
             C132 138, 118 148, 100 148
             C84 148, 68 142, 68 128"
          stroke="#ffffff"
          stroke-dasharray="240"
          stroke-dashoffset="240">
      <animate attributeName="stroke-dashoffset"
               values="240;0;-240"
               dur="2.4s"
               begin="0.2s"
               repeatCount="indefinite"/>
      <animate attributeName="opacity"
               values="1;1;0;1"
               keyTimes="0;0.5;0.75;1"
               dur="2.4s"
               begin="0.2s"
               repeatCount="indefinite"/>
    </path>

    <!-- Inner S (blue) -->
    <path d="M124 78
             C124 64, 112 60, 100 60
             C86 60, 76 68, 76 78
             C76 90, 88 96, 100 100
             C112 104, 124 110, 124 122
             C124 134, 112 142, 100 142
             C88 142, 76 138, 76 126"
          stroke="#1473e0"
          stroke-dasharray="220"
          stroke-dashoffset="220">
      <animate attributeName="stroke-dashoffset"
               values="220;0;-220"
               dur="2.4s"
               begin="0.4s"
               repeatCount="indefinite"/>
      <animate attributeName="opacity"
               values="1;1;0;1"
               keyTimes="0;0.5;0.75;1"
               dur="2.4s"
               begin="0.4s"
               repeatCount="indefinite"/>
    </path>
  </g>
</svg>
